name: Continuous Integration
on: [push, pull_request]
jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: "test-secret"
      DATABASE_URL: "postgresql://user:pass@localhost:5432/test"
      CLIENT_URL: "http://localhost:3000"
      STRIPE_SECRET_KEY: "sk_test_xxx"
      STRIPE_WEBHOOK_SECRET: "whsec_xxx"
      APP_URL: "http://localhost:3000"
      REDIS_URL: "redis://localhost:6379"
      BUCKET_NAME: "bucket-name"
      BUCKET_REGION: "eu-west-1"
      AWS_ACCESS_KEY_ID: "your aws access key id"
      AWS_SECRET_ACCESS_KEY: "your aws secret access key"
      CDN_URL: "https://your-cloudfront-url.com"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Runs Prisma generate
        run: npx prisma generate

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

      # Em PR, valida que o Dockerfile ainda builda. Na master isso é redundante:
      # o job build-and-push faz o build de verdade, na arquitetura certa.
      - name: Build Docker image (smoke test)
        if: github.event_name == 'pull_request'
        run: docker build -t ecommerce-api:ci .

  build-and-push:
    # O build acontece AQUI, não na EC2. Compilar TypeScript numa t4g.micro
    # (1 GB de RAM) esgotava a memória e derrubava a API junto — o servidor
    # agora só baixa uma imagem pronta.
    needs: continuous-integration
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    # runner ARM nativo: mesma arquitetura da EC2 (t4g = Graviton/arm64).
    # Sem isso seria preciso emular arm64 via QEMU, ordens de grandeza mais lento.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # duas tags: latest pro deploy, sha pra rastrear/rollback
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy na EC2 via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ecommerce-api.otaviobonini.dev
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd ~/ecommerce-api-node
            git pull --ff-only
            # token efêmero: vale só enquanto este workflow roda, não fica no servidor
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker logout ghcr.io
            docker image prune -f
