name: Continuous Integration
on: [push, pull_request]
jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: "test-secret"
      DATABASE_URL: "postgresql://user:pass@localhost:5432/test"
      CLIENT_URL: "http://localhost:3000"
      STRIPE_SECRET_KEY: "sk_test_xxx"
      STRIPE_WEBHOOK_SECRET: "whsec_xxx"
      APP_URL: "http://localhost:3000"
      REDIS_URL: "redis://localhost:6379"
      BUCKET_NAME: "bucket-name"
      BUCKET_REGION: "eu-west-1"
      AWS_ACCESS_KEY_ID: "your aws access key id"
      AWS_SECRET_ACCESS_KEY: "your aws secret access key"
      CDN_URL: "https://your-cloudfront-url.com"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Runs Prisma generate
        run: npx prisma generate

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t ecommerce-api:ci .

  deploy:
    # só roda se a CI passar, e só em push na master (PR não faz deploy)
    needs: continuous-integration
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy na EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ecommerce-api.otaviobonini.dev
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/ecommerce-api-node
            git pull --ff-only
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
